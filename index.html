<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watch & Cow Days</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Playfair+Display:wght@600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --red: #c1292e;
      --ink: #1e1e1c;
      --muted: #74746d;
      --page: #f7f7f3;
      --track: #dddcd3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: Montserrat, Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .header {
      padding: clamp(16px, 3vw, 32px);
      display: flex;
      align-items: center;
      gap: clamp(12px, 2.5vw, 24px);
    }

    .logo {
      display: block;
      width: clamp(82px, 12vw, 132px);
      height: auto;
      flex: 0 0 auto;
    }

    .tagline {
      max-width: 680px;
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(18px, 3.4vw, 38px);
      font-weight: 600;
      line-height: 1.08;
      min-width: 0;
    }

    .viewer {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 0 clamp(18px, 4vw, 48px) clamp(32px, 5vw, 64px);
      display: grid;
      align-content: center;
      gap: clamp(20px, 4vw, 36px);
    }

    .image-frame {
      width: min(100%, 980px);
      margin: 0 auto;
      display: grid;
      place-items: center;
      overflow: hidden;
      touch-action: none;
      cursor: grab;
      border-radius: 8px;
      background: #ffffff;
    }

    .image-frame.is-dragging {
      cursor: grabbing;
    }

    .day-image {
      display: block;
      width: 100%;
      max-height: min(62vh, 640px);
      object-fit: contain;
      transform-origin: center center;
      user-select: none;
      -webkit-user-drag: none;
      will-change: transform;
    }

    .controls {
      width: min(720px, 100%);
      margin: 0 auto;
    }

    .control-title {
      margin: 0 0 16px;
      text-align: center;
      font-size: clamp(18px, 2.4vw, 24px);
      font-weight: 700;
    }

    .slider-wrap {
      position: relative;
      padding: 0 8px;
    }

    .day-slider {
      width: 100%;
      height: 36px;
      margin: 0;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    .day-slider:focus-visible {
      outline: 3px solid rgba(193, 41, 46, 0.28);
      outline-offset: 6px;
    }

    .day-slider::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg,
          var(--red) 0%,
          var(--red) var(--progress),
          var(--track) var(--progress),
          var(--track) 100%);
    }

    .day-slider::-moz-range-track {
      height: 8px;
      border-radius: 999px;
      background: var(--track);
    }

    .day-slider::-moz-range-progress {
      height: 8px;
      border-radius: 999px;
      background: var(--red);
    }

    .day-slider::-webkit-slider-thumb {
      width: 24px;
      height: 24px;
      margin-top: -8px;
      appearance: none;
      border: 3px solid #ffffff;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 3px 12px rgba(30, 30, 28, 0.25);
    }

    .day-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border: 3px solid #ffffff;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 3px 12px rgba(30, 30, 28, 0.25);
    }

    .stops {
      position: relative;
      width: calc(100% - 24px);
      height: 18px;
      margin: 8px 12px 0;
      font-family: Montserrat, Arial, sans-serif;
      font-size: clamp(12px, 2vw, 15px);
      font-weight: 600;
      color: var(--muted);
    }

    .stop {
      position: absolute;
      top: 0;
      min-width: 2ch;
      text-align: center;
      transform: translateX(-50%);
      transition: color 160ms ease;
    }

    .stop:first-child {
      left: 0;
    }

    .stop:nth-child(2) {
      left: 33.333%;
    }

    .stop:nth-child(3) {
      left: 66.666%;
    }

    .stop:last-child {
      left: 100%;
    }

    .stop.is-active {
      color: var(--red);
      font-weight: 700;
    }

    .tour-link {
      justify-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 26px;
      border-radius: 999px;
      background: var(--red);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 26px rgba(193, 41, 46, 0.24);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .tour-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 13px 30px rgba(193, 41, 46, 0.3);
    }

    .tour-link:focus-visible {
      outline: 3px solid rgba(193, 41, 46, 0.28);
      outline-offset: 4px;
    }

    @media (max-width: 680px) {
      .page {
        grid-template-rows: auto minmax(0, 1fr);
      }

      .viewer {
        align-content: start;
        padding-top: 10px;
      }

      .day-image {
        max-height: 54vh;
      }
    }

    @media (max-height: 520px) and (orientation: landscape) {
      .page {
        min-height: 100svh;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .header {
        padding: 10px 16px 0;
      }

      .logo {
        width: clamp(58px, 9vw, 82px);
      }

      .tagline {
        max-width: calc(100vw - 128px);
        font-size: clamp(14px, 3.4vw, 20px);
        line-height: 1.05;
      }

      .viewer {
        width: min(100%, 980px);
        grid-template-columns: minmax(0, 1fr) 82px;
        align-items: center;
        align-content: center;
        gap: 18px;
        padding: 4px 18px 14px;
      }

      .image-frame {
        width: 100%;
      }

      .day-image {
        width: 100%;
        max-height: calc(100svh - 70px);
      }

      .controls {
        width: 82px;
        height: min(70svh, 260px);
        margin: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        justify-items: center;
        align-self: center;
      }

      .control-title {
        margin: 0 0 0px;
        font-size: 13px;
        line-height: 1;
        writing-mode: horizontal-tb;
      }

      .slider-wrap {
        width: 82px;
        height: 100%;
        padding: 0;
        display: grid;
        grid-template-columns: 36px 32px;
        align-items: center;
        justify-content: center;
        column-gap: 8px;
      }

      .day-slider {
        width: 100%;
        height: 100%;
        writing-mode: vertical-lr;
      }

      .is-landscape .day-slider::-webkit-slider-runnable-track {
        width: 8px;
        height: 100%;
        background: linear-gradient(180deg,
            var(--red) 0%,
            var(--red) var(--progress),
            var(--track) var(--progress),
            var(--track) 100%);
      }

      .is-landscape .day-slider::-moz-range-track {
        width: 8px;
        height: 100%;
      }

      .is-landscape .day-slider::-webkit-slider-thumb {
        margin-top: 0;
        margin-left: -8px;
      }

      .stops {
        display: grid;
        width: auto;
        height: 100%;
        margin: 0;
        grid-template-columns: 1fr;
        grid-template-rows: repeat(4, 1fr);
        align-items: center;
        font-size: 12px;
      }

      .stop,
      .stop:first-child,
      .stop:last-child {
        position: static;
        transform: none;
        text-align: left;
      }

      .tour-link {
        grid-column: 1 / -1;
        min-height: 36px;
        padding: 0 18px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <img class="logo" src="WATCH-COW-Logo.svg" alt="Watch Cow">
      <p class="tagline">4 versions of the Grand Trans Alpina Tour of Switzerland</p>
    </header>

    <section class="viewer" aria-label="Day image selector">
      <div class="image-frame">
        <img id="dayImage" class="day-image" src="images/5.png" alt="Watch Cow image for 5 days">
      </div>

      <div class="controls">
        <h1 class="control-title">Days</h1>
        <div class="slider-wrap">
          <input id="daySlider" class="day-slider" type="range" min="0" max="3" step="1" value="0"
            aria-label="Select number of days">
          <div class="stops" aria-hidden="true">
            <span class="stop is-active">5</span>
            <span class="stop">8</span>
            <span class="stop">10</span>
            <span class="stop">14</span>
          </div>
        </div>
      </div>

      <a id="tourLink" class="tour-link" href="#">View tour</a>
    </section>
  </main>

  <script>
    // Replace each "#" below with the URL for that tour version.
    const days = [
      { label: "5", image: "images/5.png", url: "https://pages.ezus.io/watch&cow/GrandTransAlpina5/index.html" },
      { label: "8", image: "images/8.png", url: "https://pages.ezus.io/watch&cow/GrandTransAlpina8/index.html" },
      { label: "10", image: "images/10.png", url: "https://pages.ezus.io/watch&cow/GrandTransAlpina10/index.html" },
      { label: "14", image: "images/14.png", url: "https://pages.ezus.io/watch&cow/GrandTransAlpina14/index.html" }
    ];

    const slider = document.querySelector("#daySlider");
    const imageFrame = document.querySelector(".image-frame");
    const image = document.querySelector("#dayImage");
    const tourLink = document.querySelector("#tourLink");
    const stops = Array.from(document.querySelectorAll(".stop"));
    const landscapeQuery = window.matchMedia("(max-height: 520px) and (orientation: landscape)");
    const zoomState = {
      scale: 1,
      x: 0,
      y: 0,
      pointers: new Map(),
      lastDragPoint: null,
      lastPinchDistance: 0,
      lastPinchCenter: null
    };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function applyImageTransform() {
      image.style.transform = `translate3d(${zoomState.x}px, ${zoomState.y}px, 0) scale(${zoomState.scale})`;
    }

    function clampPan() {
      if (zoomState.scale <= 1) {
        zoomState.scale = 1;
        zoomState.x = 0;
        zoomState.y = 0;
        applyImageTransform();
        return;
      }

      applyImageTransform();

      const frameRect = imageFrame.getBoundingClientRect();
      const imageRect = image.getBoundingClientRect();
      const frameCenterX = frameRect.left + frameRect.width / 2;
      const frameCenterY = frameRect.top + frameRect.height / 2;
      const imageCenterX = imageRect.left + imageRect.width / 2;
      const imageCenterY = imageRect.top + imageRect.height / 2;

      if (imageRect.width <= frameRect.width) {
        zoomState.x += frameCenterX - imageCenterX;
      } else if (imageRect.left > frameRect.left) {
        zoomState.x += frameRect.left - imageRect.left;
      } else if (imageRect.right < frameRect.right) {
        zoomState.x += frameRect.right - imageRect.right;
      }

      if (imageRect.height <= frameRect.height) {
        zoomState.y += frameCenterY - imageCenterY;
      } else if (imageRect.top > frameRect.top) {
        zoomState.y += frameRect.top - imageRect.top;
      } else if (imageRect.bottom < frameRect.bottom) {
        zoomState.y += frameRect.bottom - imageRect.bottom;
      }

      applyImageTransform();
    }

    function zoomAt(clientX, clientY, nextScale) {
      const currentScale = zoomState.scale;
      const scale = clamp(nextScale, 1, 4);

      if (scale === currentScale) {
        return;
      }

      const beforeRect = image.getBoundingClientRect();
      const focusX = (clientX - beforeRect.left) / beforeRect.width;
      const focusY = (clientY - beforeRect.top) / beforeRect.height;

      zoomState.scale = scale;
      applyImageTransform();

      const afterRect = image.getBoundingClientRect();
      zoomState.x += clientX - (afterRect.left + afterRect.width * focusX);
      zoomState.y += clientY - (afterRect.top + afterRect.height * focusY);
      clampPan();
    }

    function getDistance(first, second) {
      return Math.hypot(first.clientX - second.clientX, first.clientY - second.clientY);
    }

    function getCenter(first, second) {
      return {
        x: (first.clientX + second.clientX) / 2,
        y: (first.clientY + second.clientY) / 2
      };
    }

    function updateOrientation() {
      document.documentElement.classList.toggle("is-landscape", landscapeQuery.matches);
      clampPan();
    }

    function updateDay() {
      const selected = Number(slider.value);
      const day = days[selected];
      const progress = `${(selected / (days.length - 1)) * 100}%`;

      slider.style.setProperty("--progress", progress);
      image.src = day.image;
      image.alt = `Watch Cow image for ${day.label} days`;
      tourLink.href = day.url;
      tourLink.textContent = `View ${day.label}-day tour`;
      tourLink.setAttribute("aria-label", `View ${day.label} day tour`);

      stops.forEach((stop, index) => {
        stop.classList.toggle("is-active", index === selected);
      });
    }

    slider.addEventListener("input", updateDay);
    imageFrame.addEventListener("wheel", (event) => {
      event.preventDefault();
      const zoomAmount = event.deltaY < 0 ? 1.12 : 0.88;
      zoomAt(event.clientX, event.clientY, zoomState.scale * zoomAmount);
    }, { passive: false });

    imageFrame.addEventListener("pointerdown", (event) => {
      imageFrame.setPointerCapture(event.pointerId);
      imageFrame.classList.add("is-dragging");
      zoomState.pointers.set(event.pointerId, event);

      if (zoomState.pointers.size === 1) {
        zoomState.lastDragPoint = { x: event.clientX, y: event.clientY };
      }

      if (zoomState.pointers.size === 2) {
        const [first, second] = Array.from(zoomState.pointers.values());
        zoomState.lastPinchDistance = getDistance(first, second);
        zoomState.lastPinchCenter = getCenter(first, second);
      }
    });

    imageFrame.addEventListener("pointermove", (event) => {
      if (!zoomState.pointers.has(event.pointerId)) {
        return;
      }

      zoomState.pointers.set(event.pointerId, event);

      if (zoomState.pointers.size === 2) {
        const [first, second] = Array.from(zoomState.pointers.values());
        const distance = getDistance(first, second);
        const center = getCenter(first, second);

        if (zoomState.lastPinchDistance > 0 && zoomState.lastPinchCenter) {
          zoomState.x += center.x - zoomState.lastPinchCenter.x;
          zoomState.y += center.y - zoomState.lastPinchCenter.y;
          zoomAt(center.x, center.y, zoomState.scale * (distance / zoomState.lastPinchDistance));
        }

        zoomState.lastPinchDistance = distance;
        zoomState.lastPinchCenter = center;
        return;
      }

      if (zoomState.scale > 1 && zoomState.lastDragPoint) {
        zoomState.x += event.clientX - zoomState.lastDragPoint.x;
        zoomState.y += event.clientY - zoomState.lastDragPoint.y;
        zoomState.lastDragPoint = { x: event.clientX, y: event.clientY };
        clampPan();
      }
    });

    function endPointer(event) {
      zoomState.pointers.delete(event.pointerId);

      if (zoomState.pointers.size === 0) {
        zoomState.lastDragPoint = null;
        zoomState.lastPinchDistance = 0;
        zoomState.lastPinchCenter = null;
        imageFrame.classList.remove("is-dragging");
        return;
      }

      if (zoomState.pointers.size === 1) {
        const [remainingPointer] = Array.from(zoomState.pointers.values());
        zoomState.lastDragPoint = {
          x: remainingPointer.clientX,
          y: remainingPointer.clientY
        };
        zoomState.lastPinchDistance = 0;
        zoomState.lastPinchCenter = null;
      }
    }

    imageFrame.addEventListener("pointerup", endPointer);
    imageFrame.addEventListener("pointercancel", endPointer);
    image.addEventListener("load", clampPan);
    window.addEventListener("resize", clampPan);

    if (landscapeQuery.addEventListener) {
      landscapeQuery.addEventListener("change", updateOrientation);
    } else {
      landscapeQuery.addListener(updateOrientation);
    }

    updateOrientation();
    updateDay();
  </script>
</body>

</html>
