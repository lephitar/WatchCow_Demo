<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watch & Cow Days</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Playfair+Display:wght@600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --red: #c1292e;
      --ink: #1e1e1c;
      --muted: #74746d;
      --page: #f7f7f3;
      --track: #dddcd3;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: Montserrat, Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .header {
      padding: clamp(16px, 3vw, 32px);
      display: flex;
      align-items: center;
      gap: clamp(12px, 2.5vw, 24px);
    }

    .logo {
      display: block;
      width: clamp(82px, 12vw, 132px);
      height: auto;
      flex: 0 0 auto;
    }

    .tagline {
      max-width: 680px;
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(18px, 3.4vw, 38px);
      font-weight: 600;
      line-height: 1.08;
      min-width: 0;
    }

    .viewer {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 0 clamp(18px, 4vw, 48px) clamp(32px, 5vw, 64px);
      display: grid;
      align-content: center;
      gap: clamp(20px, 4vw, 36px);
    }

    .image-frame {
      width: min(100%, 980px);
      aspect-ratio: 797.96 / 534.38;
      max-height: min(62vh, 640px);
      margin: 0 auto;
      overflow: hidden;
      touch-action: none;
      cursor: grab;
      border-radius: 8px;
      background: #fff;
    }

    .image-frame.is-dragging { cursor: grabbing; }

    /* Zoom works by changing viewBox — no CSS transform is ever applied */
    #mapSvg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      width: min(720px, 100%);
      margin: 0 auto;
    }

    .control-title {
      margin: 0 0 16px;
      text-align: center;
      font-size: clamp(18px, 2.4vw, 24px);
      font-weight: 700;
    }

    .slider-wrap {
      position: relative;
      padding: 0 8px;
    }

    .day-slider {
      width: 100%;
      height: 36px;
      margin: 0;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    .day-slider:focus-visible {
      outline: 3px solid rgba(193, 41, 46, 0.28);
      outline-offset: 6px;
    }

    .day-slider::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg,
        var(--red) 0%, var(--red) var(--progress),
        var(--track) var(--progress), var(--track) 100%);
    }

    .day-slider::-moz-range-track {
      height: 8px;
      border-radius: 999px;
      background: var(--track);
    }

    .day-slider::-moz-range-progress {
      height: 8px;
      border-radius: 999px;
      background: var(--red);
    }

    .day-slider::-webkit-slider-thumb {
      width: 24px;
      height: 24px;
      margin-top: -8px;
      appearance: none;
      border: 3px solid #fff;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 3px 12px rgba(30, 30, 28, 0.25);
    }

    .day-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border: 3px solid #fff;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 3px 12px rgba(30, 30, 28, 0.25);
    }

    .stops {
      position: relative;
      width: calc(100% - 24px);
      height: 18px;
      margin: 8px 12px 0;
      font-family: Montserrat, Arial, sans-serif;
      font-size: clamp(12px, 2vw, 15px);
      font-weight: 600;
      color: var(--muted);
    }

    .stop {
      position: absolute;
      top: 0;
      min-width: 2ch;
      text-align: center;
      transform: translateX(-50%);
      transition: color 160ms ease;
    }

    .stop:first-child  { left: 0; }
    .stop:nth-child(2) { left: 33.333%; }
    .stop:nth-child(3) { left: 66.666%; }
    .stop:last-child   { left: 100%; }

    .stop.is-active { color: var(--red); font-weight: 700; }

    .tour-link {
      justify-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 26px;
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 26px rgba(193, 41, 46, 0.24);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .tour-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 13px 30px rgba(193, 41, 46, 0.3);
    }

    .tour-link:focus-visible {
      outline: 3px solid rgba(193, 41, 46, 0.28);
      outline-offset: 4px;
    }

    @media (max-width: 680px) {
      .page { grid-template-rows: auto minmax(0, 1fr); }
      .viewer { align-content: start; padding-top: 10px; }
    }

    @media (max-height: 520px) and (orientation: landscape) {
      .page { min-height: 100svh; grid-template-rows: auto minmax(0, 1fr); }
      .header { padding: 10px 16px 0; }
      .logo { width: clamp(58px, 9vw, 82px); }
      .tagline {
        max-width: calc(100vw - 128px);
        font-size: clamp(14px, 3.4vw, 20px);
        line-height: 1.05;
      }
      .viewer {
        width: min(100%, 980px);
        grid-template-columns: minmax(0, 1fr) 82px;
        align-items: center;
        align-content: center;
        gap: 18px;
        padding: 4px 18px 14px;
      }
      .image-frame { width: 100%; max-height: calc(100svh - 70px); }
      .controls {
        width: 82px;
        height: min(70svh, 260px);
        margin: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        justify-items: center;
        align-self: center;
      }
      .control-title { margin: 0; font-size: 13px; line-height: 1; }
      .slider-wrap {
        width: 82px;
        height: 100%;
        padding: 0;
        display: grid;
        grid-template-columns: 36px 32px;
        align-items: center;
        justify-content: center;
        column-gap: 8px;
      }
      .day-slider { width: 100%; height: 100%; writing-mode: vertical-lr; }
      .is-landscape .day-slider::-webkit-slider-runnable-track {
        width: 8px; height: 100%;
        background: linear-gradient(180deg,
          var(--red) 0%, var(--red) var(--progress),
          var(--track) var(--progress), var(--track) 100%);
      }
      .is-landscape .day-slider::-moz-range-track  { width: 8px; height: 100%; }
      .is-landscape .day-slider::-webkit-slider-thumb { margin-top: 0; margin-left: -8px; }
      .stops {
        display: grid;
        width: auto;
        height: 100%;
        margin: 0;
        grid-template-columns: 1fr;
        grid-template-rows: repeat(4, 1fr);
        align-items: center;
        font-size: 12px;
      }
      .stop, .stop:first-child, .stop:last-child {
        position: static; transform: none; text-align: left;
      }
      .tour-link { grid-column: 1 / -1; min-height: 36px; padding: 0 18px; font-size: 12px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <img class="logo" src="WATCH-COW-Logo.svg" alt="Watch Cow">
      <p class="tagline">4 versions of the Grand Trans Alpina Tour of Switzerland</p>
    </header>

    <section class="viewer" aria-label="Day image selector">
      <div class="image-frame">
        <!--
          Single SVG element holds both layers.
          Zoom = narrowing the viewBox; SVG vectors re-render at full quality.
          No CSS transform is ever used for zoom.
        -->
        <svg id="mapSvg" viewBox="0 0 797.96 534.38"
             preserveAspectRatio="xMidYMid meet"
             xmlns="http://www.w3.org/2000/svg"
             aria-label="Watch Cow map for 5 days">
          <!-- JPEG fills the SVG coordinate space exactly (same aspect ratio) -->
          <image id="mapImage" href="images2/map.jpg"
                 x="0" y="0" width="797.96" height="534.38"
                 preserveAspectRatio="none"/>
          <!-- Route overlay appended here by loadRoute() -->
        </svg>
      </div>

      <div class="controls">
        <h1 class="control-title">Days</h1>
        <div class="slider-wrap">
          <input id="daySlider" class="day-slider" type="range"
                 min="0" max="3" step="1" value="0"
                 aria-label="Select number of days">
          <div class="stops" aria-hidden="true">
            <span class="stop is-active">5</span>
            <span class="stop">8</span>
            <span class="stop">10</span>
            <span class="stop">14</span>
          </div>
        </div>
      </div>

      <a id="tourLink" class="tour-link" href="#">View tour</a>
    </section>
  </main>

  <script>
    const days = [
      { label: "5",  route: "images2/5.svg",  url: "https://pages.ezus.io/watch&cow/GrandTransAlpina5/index.html"  },
      { label: "8",  route: "images2/8.svg",  url: "https://pages.ezus.io/watch&cow/GrandTransAlpina8/index.html"  },
      { label: "10", route: "images2/10.svg", url: "https://pages.ezus.io/watch&cow/GrandTransAlpina10/index.html" },
      { label: "14", route: "images2/14.svg", url: "https://pages.ezus.io/watch&cow/GrandTransAlpina14/index.html" }
    ];

    const MAP_W = 797.96, MAP_H = 534.38;

    const svg        = document.getElementById("mapSvg");
    const mapImage   = document.getElementById("mapImage");
    const imageFrame = document.querySelector(".image-frame");
    const slider     = document.getElementById("daySlider");
    const tourLink   = document.getElementById("tourLink");
    const stops      = Array.from(document.querySelectorAll(".stop"));
    const landscape  = window.matchMedia("(max-height: 520px) and (orientation: landscape)");

    // ---------- viewBox zoom / pan ----------

    const view = { scale: 1, panX: 0, panY: 0 };
    const pointers = new Map();
    let lastDrag = null, lastPinchDist = 0, lastPinchCenter = null;

    function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

    function applyViewBox() {
      const w = MAP_W / view.scale, h = MAP_H / view.scale;
      svg.setAttribute("viewBox", `${view.panX} ${view.panY} ${w} ${h}`);
    }

    function clampAndApply() {
      if (view.scale <= 1) {
        view.scale = 1; view.panX = 0; view.panY = 0;
      } else {
        const w = MAP_W / view.scale, h = MAP_H / view.scale;
        view.panX = clamp(view.panX, 0, MAP_W - w);
        view.panY = clamp(view.panY, 0, MAP_H - h);
      }
      applyViewBox();
    }

    function toSVG(cx, cy) {
      const pt = svg.createSVGPoint();
      pt.x = cx; pt.y = cy;
      return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function zoomAt(cx, cy, nextScale) {
      const s = clamp(nextScale, 1, 4);
      if (s === view.scale) return;
      const p  = toSVG(cx, cy);
      const vW = MAP_W / view.scale, vH = MAP_H / view.scale;
      const fx = (p.x - view.panX) / vW, fy = (p.y - view.panY) / vH;
      view.scale = s;
      view.panX  = p.x - fx * (MAP_W / s);
      view.panY  = p.y - fy * (MAP_H / s);
      clampAndApply();
    }

    function panBy(dx, dy) {
      if (view.scale <= 1) return;
      const r = svg.getBoundingClientRect();
      view.panX -= dx * (MAP_W / view.scale) / r.width;
      view.panY -= dy * (MAP_H / view.scale) / r.height;
      clampAndApply();
    }

    function dist(a, b) { return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); }
    function mid(a, b)  { return { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 }; }

    imageFrame.addEventListener("pointerdown", e => {
      imageFrame.setPointerCapture(e.pointerId);
      imageFrame.classList.add("is-dragging");
      pointers.set(e.pointerId, e);
      if (pointers.size === 1) lastDrag = { x: e.clientX, y: e.clientY };
      if (pointers.size === 2) {
        const [a, b] = [...pointers.values()];
        lastPinchDist = dist(a, b); lastPinchCenter = mid(a, b);
      }
    });

    imageFrame.addEventListener("pointermove", e => {
      if (!pointers.has(e.pointerId)) return;
      pointers.set(e.pointerId, e);
      if (pointers.size === 2) {
        const [a, b] = [...pointers.values()];
        const d = dist(a, b), c = mid(a, b);
        if (lastPinchDist > 0 && lastPinchCenter) {
          panBy(c.x - lastPinchCenter.x, c.y - lastPinchCenter.y);
          zoomAt(c.x, c.y, view.scale * (d / lastPinchDist));
        }
        lastPinchDist = d; lastPinchCenter = c;
        return;
      }
      if (lastDrag) {
        panBy(e.clientX - lastDrag.x, e.clientY - lastDrag.y);
        lastDrag = { x: e.clientX, y: e.clientY };
      }
    });

    function endPointer(e) {
      pointers.delete(e.pointerId);
      if (pointers.size === 0) {
        lastDrag = null; lastPinchDist = 0; lastPinchCenter = null;
        imageFrame.classList.remove("is-dragging");
      } else if (pointers.size === 1) {
        const [r] = [...pointers.values()];
        lastDrag = { x: r.clientX, y: r.clientY };
        lastPinchDist = 0; lastPinchCenter = null;
      }
    }

    imageFrame.addEventListener("pointerup",     endPointer);
    imageFrame.addEventListener("pointercancel", endPointer);

    imageFrame.addEventListener("wheel", e => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, view.scale * (e.deltaY < 0 ? 1.12 : 0.88));
    }, { passive: false });

    window.addEventListener("resize", clampAndApply);

    function syncLandscape() {
      document.documentElement.classList.toggle("is-landscape", landscape.matches);
      clampAndApply();
    }
    landscape.addEventListener ? landscape.addEventListener("change", syncLandscape)
                               : landscape.addListener(syncLandscape);

    // ---------- route loading ----------

    // Fetches an SVG file and appends its children directly to the root <svg>.
    // Key: <defs> lands at SVG root level so its <style> cascades to all siblings.
    // The C2PA metadata block is stripped before parsing (large, not needed).
    async function loadRoute(url) {
      // Remove previous route content, keep only the base map image
      [...svg.children].forEach(c => { if (c !== mapImage) c.remove(); });

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let text = await res.text();

        // Strip C2PA certificate metadata — large and unnecessary for rendering
        text = text.replace(/<metadata>[\s\S]*?<\/metadata>/, "");

        const doc = new DOMParser().parseFromString(text, "image/svg+xml");
        const src = doc.documentElement;
        if (src.querySelector("parsererror")) throw new Error("SVG parse error");

        // Append each child directly to the SVG root so <defs>/<style> cascades
        for (const child of [...src.children]) {
          if (child.tagName !== "metadata") {
            svg.appendChild(document.importNode(child, true));
          }
        }
      } catch (e) {
        console.error("loadRoute failed:", url, e);
      }
    }

    // ---------- day selector ----------

    function updateDay() {
      const i = Number(slider.value), day = days[i];
      slider.style.setProperty("--progress", `${(i / (days.length - 1)) * 100}%`);
      loadRoute(day.route);
      svg.setAttribute("aria-label", `Watch Cow map for ${day.label} days`);
      tourLink.href        = day.url;
      tourLink.textContent = `View ${day.label}-day tour`;
      tourLink.setAttribute("aria-label", `View ${day.label} day tour`);
      stops.forEach((s, j) => s.classList.toggle("is-active", j === i));
    }

    slider.addEventListener("input", updateDay);
    syncLandscape();
    updateDay();
  </script>
</body>

</html>
